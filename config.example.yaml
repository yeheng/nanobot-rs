# gasket Configuration Example
# This file demonstrates the configuration format.
# Required fields have definite values; optional fields are commented out.

# ── Provider configurations ──────────────────────────────────────────────
#
# Provider name determines the native implementation automatically.
# You usually do NOT need to set 'provider_type':
#   "minimax"/"minimaxi"   → native MiniMax API
#   "gemini"               → native Gemini API
#   "moonshot"/"kimi"      → native Moonshot API
#   "anthropic"/"claude"   → native Anthropic Messages API
#   "copilot"              → native GitHub Copilot API
#   "openai", "deepseek", "zhipu", "openrouter", "ollama", "litellm"
#                          → OpenAI-compatible
#
# Only set 'provider_type' if your provider name is unrecognizable
# (e.g. "my-proxy" with provider_type: anthropic).
#
# Per-provider model pricing is optional — without it, cost tracking is disabled.
providers:
  openai:
    api_base: "https://api.openai.com/v1"
    api_key: "${OPENAI_API_KEY}"

  anthropic:
    api_base: "https://api.anthropic.com/v1"
    api_key: "${ANTHROPIC_API_KEY}"

  zhipu:
    api_base: "https://open.bigmodel.cn/api/paas/v4"
    api_key: "${ZHIPU_API_KEY}"

  deepseek:
    api_base: "https://api.deepseek.com/v1"
    api_key: "${DEEPSEEK_API_KEY}"
    default_currency: USD
    models:
      deepseek-chat:
        price_input_per_million: 0.5
        price_output_per_million: 1.0
      deepseek-reasoner:
        price_input_per_million: 2.0
        price_output_per_million: 8.0
        thinking_enabled: true
        max_tokens: 8192

  openrouter:
    api_base: "https://openrouter.ai/api/v1"
    api_key: "${OPENROUTER_API_KEY}"

  gemini:
    api_base: "https://generativelanguage.googleapis.com/v1beta"
    api_key: "${GOOGLE_API_KEY}"

  ollama:
    api_base: "http://localhost:11434/v1"

  litellm:
    api_base: "http://localhost:4000/v1"

# ── Agent configuration ──────────────────────────────────────────────────
agents:
  defaults:
    model: "zhipu/glm-5"
    max_iterations: 100
    temperature: 0.7
    max_tokens: 4096
    memory_window: 10
    thinking_enabled: false
    streaming: true
    plugin_timeout_secs: 120
    ws_summary_limit: 0
    # Optional: override internal AI behavior prompts.
    # All prompts support runtime placeholders:
    #   {{conversation}} — evolution / distill templates
    #   {{goal}}, {{context}} — planning template
    #   {{memories}} — distill template
    # prompts:
    #   identity_prefix: "You are a helpful assistant.\nWorking directory: {workspace}."
    #   summarization: "Summarize the following conversation in bullet points."
    #   checkpoint: "Summarize current task state for working memory."
    #   planning: "Create a plan for: {{goal}}\n\nContext:\n{{context}}"
    #   evolution: |
    #     You are a memory extraction sub-system.
    #     ... (custom evolution prompt)
    #     {{conversation}}
    #   distill: |
    #     You are a knowledge distillation engine.
    #     ... (custom distill prompt)
    #     {{memories}}

  # Model profiles — used by switch_model tool for dynamic delegation.
  # Only these fields are recognized:
  #   model (required), provider (required),
  #   temperature, max_tokens, thinking_enabled
  models:
    default:
      provider: "zhipu"
      model: "glm-5"
      temperature: 0.7

    fast:
      provider: "zhipu"
      model: "glm-4-flash"
      temperature: 0.7
      max_tokens: 2048

    coder:
      provider: "deepseek"
      model: "deepseek-coder"
      temperature: 0.3
      thinking_enabled: true

    reasoner:
      provider: "deepseek"
      model: "deepseek-reasoner"
      temperature: 0.7
      thinking_enabled: true
      max_tokens: 8192

    creative:
      provider: "anthropic"
      model: "claude-sonnet-4-20250514"
      temperature: 0.9

