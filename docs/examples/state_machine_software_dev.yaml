# 软件开发工作流配置示例
#
# 完整的软件开发流程：需求 → 设计 → 开发 → 测试 → 发布

# 初始状态
initial_state: requirements

# 终端状态
terminal_states:
  - released
  - cancelled

# 活跃状态
active_states:
  - requirements
  - design
  - development
  - testing

# 同步角色
sync_roles:
  - product_owner
  - architect
  - qa_lead

# 状态流转
transitions:
  # 需求阶段
  - from: pending
    to: requirements
  - from: requirements
    to: design
  - from: requirements
    to: cancelled

  # 设计阶段
  - from: design
    to: development
  - from: design
    to: requirements  # 打回重新设计

  # 开发阶段
  - from: development
    to: testing
  - from: development
    to: design  # 技术问题需要重新设计

  # 测试阶段
  - from: testing
    to: released  # 测试通过
  - from: testing
    to: development  # 测试失败，打回修复

  # 发布后发现问题的处理
  - from: released
    to: development  # 需要修复 bug

# 状态 → 角色映射
state_roles:
  pending: system
  requirements: product_owner
  design: architect
  development: developer
  testing: qa_engineer
  released: system
  cancelled: system

# 角色定义
roles:
  product_owner:
    description: "产品负责人 - 需求分析"
    allowed_agents:
      - architect
    responsible_states:
      - requirements

  architect:
    description: "架构师 - 系统设计"
    allowed_agents:
      - developer
    responsible_states:
      - design

  developer:
    description: "开发工程师 - 实现功能"
    allowed_agents:
      - qa_engineer
    responsible_states:
      - development

  qa_engineer:
    description: "测试工程师 - 质量保证"
    allowed_agents:
      - developer
      - product_owner
    responsible_states:
      - testing

# 门控配置
gates:
  testing:
    reject_to: development

# 最大审核轮次
max_reviews: 3

# 停滞超时 (秒) - 开发阶段给更长一点的时间
stall_timeout_secs: 300
