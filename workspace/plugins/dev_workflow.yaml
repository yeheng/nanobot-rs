name: "dev_workflow"
description: "Research → Plan → Implement → Review loop for code generation"
version: "0.1.0"
protocol: json_rpc
parameters:
  type: object
  properties:
    task:
      type: string
      description: "What to build"
    max_iterations:
      type: integer
      description: "Max review loop iterations (default 3)"
      default: 3
    reasoner_model:
      type: string
      description: "Model for research/plan/review. Optional; engine default if omitted."
    coder_model:
      type: string
      description: "Model for implementation. Optional; engine default if omitted."
  required: ["task"]
runtime:
  command: "python3"
  args: ["workflows/dev.py"]
  timeout_secs: 1200
  env:
    PYTHONUNBUFFERED: "1"
permissions:
  - subagent_spawn
  - message_send
