name: "dev_workflow"
description: "Research → Plan → Implement → Review loop for code generation"
parameters:
  type: object
  properties:
    task:
      type: string
      description: "What to build"
    max_iterations:
      type: integer
      description: "Max review loop iterations (default 3)"
      default: 3
    reasoner_model:
      type: string
      description: "Model for research/plan/review. Optional; engine default if omitted."
    coder_model:
      type: string
      description: "Model for implementation. Optional; engine default if omitted."
  required: ["task"]
start_step: "research"
steps:
  research:
    prompt: "Research strictly relevant context for this task. Be concise.\n\nTask: {{input.task}}"
    next: "plan"
  plan:
    prompt: "Create concrete implementation steps based on research.\n\nTask: {{input.task}}\n\nResearch:\n{{research}}"
    next: "implement"
  implement:
    prompt: "Implement this plan. Output runnable code only.\n\nPlan:\n{{plan}}\n\nPrevious attempt (may be empty):\n{{implement}}\n\nFeedback to address (if any):\n{{review.reason}}"
    next: "review"
  review:
    prompt: "Review this code against the plan. Be strict.\n\nOutput STRICT JSON only, no prose, no markdown fences:\n{\"verdict\": \"PASS\" | \"FAIL\", \"reason\": \"<one sentence>\"}\n\nPlan:\n{{plan}}\n\nCode:\n{{implement}}"
    evaluate:
      on_pass: "DONE"
      on_fail: "implement"
      max_retries: 3
