name: "self_refine"
description: "LLM自我精炼流程 — 从最近对话中提取上下文，通过 Evaluate → Diagnose → Refine → Validate → Distill 闭环提升输出质量并持久化知识"
parameters:
  type: object
  properties:
    topic:
      type: string
      description: "用户指定的精炼主题或关注点（可选，留空则自动从最近对话中提取）"
      default: ""
    constraints:
      type: string
      description: "额外约束条件（可选，覆盖默认约束）"
      default: ""
    max_cycles:
      type: integer
      description: "diagnose→refine 最大循环次数 (default 3)"
      default: 3
    min_accept_score:
      type: number
      description: "最终接受阈值 (default 7)"
      default: 7
    reasoner_model:
      type: string
      description: "Model for evaluation/diagnosis. Optional; engine default if omitted."
    executor_model:
      type: string
      description: "Model for execution/refinement. Optional; engine default if omitted."
  required: []
start_step: "gather"
steps:
  gather:
    prompt: |
      Fetch the most recent conversation history to provide context for self-refinement.

      1. Call `history_query` with limit=10 to get the latest session events.
      2. From the results, extract the key topics, decisions, and assistant responses.
      3. If the user specified a topic ({{input.topic}}), focus on events related to that topic.
      4. Summarize the extracted context in a structured format:

      Output:
      - Recent Topics: [list of key topics discussed]
      - Key Decisions: [list of decisions or conclusions reached]
      - Assistant Responses: [summarized key responses that could benefit from refinement]
      - Raw Context: [the full conversation excerpt for reference]
    tools: ["history_query"]
    next: "execute"

  execute:
    prompt: |
      Based on the gathered context, perform self-refinement: identify the most valuable
      insight or response from recent conversations and produce an improved, deeper analysis.

      Gathered Context: {{gather}}
      User Focus: {{input.topic}}

      Default Constraints (override with {{input.constraints}} if provided):
      - Focus on actionable, persistent knowledge rather than transient conversation
      - Preserve factual accuracy — do not fabricate information
      - Aim for concise, well-structured output

      Provide your best refined analysis:
      - Solution: [your refined answer]
      - Reasoning: [step-by-step reasoning chain]
      - Confidence: [0-1, self-assessed]
      - Assumptions: [list any assumptions made]
    next: "evaluate"

  evaluate:
    prompt: |
      You are a strict evaluator. Critically assess the following output on these dimensions:

      Context: {{gather}}
      Output to Evaluate: {{execute}}

      Rate each dimension (1-10) with specific evidence:

      1. **Correctness**: Is the answer factually/logically correct? Where are errors?
      2. **Completeness**: Does it address ALL parts of the context? What's missing?
      3. **Reasoning Quality**: Is the logic sound? Any gaps or leaps?
      4. **Efficiency**: Is the approach optimal? Any unnecessary complexity?
      5. **Robustness**: Would this work under edge cases?

      For EACH dimension scored < 7:
      - LOCATE the specific problematic segment
      - EXPLAIN why it's insufficient
      - SUGGEST a concrete improvement instruction

      Output format (JSON):
      {
        "scores": {"correctness": N, "completeness": N, "reasoning": N, "efficiency": N, "robustness": N},
        "overall_score": N,
        "critical_issues": [
          {"dimension": "...", "location": "...", "problem": "...", "improvement": "..."}
        ],
        "verdict": "PASS" | "FAIL",
        "reason": "<one sentence explaining the decision>"
      }
    evaluate:
      on_pass: "validate"
      on_fail: "diagnose"
      max_retries: 3

  diagnose:
    prompt: |
      Based on the evaluation below, perform root cause analysis.

      Context: {{gather}}
      Original Output: {{execute}}
      Evaluation: {{evaluate}}

      For each critical issue, classify the root cause:

      1. **Knowledge Gap** — Missing or incorrect factual knowledge
      2. **Reasoning Gap** — Logical errors, missing steps, flawed deduction
      3. **Strategy Gap** — Wrong approach chosen, poor planning, suboptimal decomposition
      4. **Instruction Misunderstanding** — Misread the context requirements

      For each classified issue, produce:
      - Root cause category
      - Specific description
      - Learning principle (abstract, reusable)

      Output format (JSON):
      {
        "diagnoses": [
          {
            "issue": "...",
            "category": "knowledge_gap|reasoning_gap|strategy_gap|misunderstanding",
            "root_cause": "...",
            "learning_principle": "abstract reusable principle in one sentence"
          }
        ],
        "fix_plan": ["ordered list of specific fixes to apply"]
      }
    next: "refine"

  refine:
    prompt: |
      Refine the original output by applying the diagnosed fixes IN ORDER.

      Context: {{gather}}
      Original Output: {{execute}}
      Fix Plan: {{diagnose.fix_plan}}
      Learning Principles: {{diagnose.learning_principles}}

      Rules:
      - Apply fixes sequentially. After each fix, briefly state what changed and why.
      - Preserve any part of the original output NOT affected by the fixes.
      - Do NOT introduce new issues while fixing existing ones.
      - If a fix conflicts with another, explain the trade-off and choose the better option.

      Output format:
      - Refined Solution: [updated answer]
      - Change Log: [{fix_applied, what_changed, rationale}]
      - New Confidence: [0-1]
      - Remaining Concerns: [any issues you couldn't fully resolve]
    next: "validate"

  validate:
    prompt: |
      You are an independent validator. Evaluate the refined output WITHOUT seeing the previous iterations.

      Context: {{gather}}
      Refined Output: {{refine}}
      Previously Identified Issues: {{evaluate.critical_issues}}

      Validation checklist:
      □ 1. Does it correctly address the context? (verify against original requirements)
      □ 2. Are all previously identified issues resolved?
      □ 3. Are there any NEW issues introduced?
      □ 4. Is the reasoning chain complete and sound?
      □ 5. Would an expert in this domain approve this output?

      For each item: PASS / FAIL + evidence

      Final verdict (JSON):
      {
        "verdict": "PASS" | "FAIL",
        "reason": "<one sentence>",
        "items": {"1": "PASS/FAIL: evidence", "2": "...", "3": "...", "4": "...", "5": "..."},
        "quality_delta": "improved|unchanged|degraded vs expected baseline",
        "recommendation": "accept|re_refine|escalate_to_human"
      }
    evaluate:
      on_pass: "distill"
      on_fail: "diagnose"
      max_retries: 3

  distill:
    prompt: |
      Distill the learning from this self-refinement cycle into reusable knowledge.

      Context Summary: {{gather}}
      Final Output: {{refine}}
      Learning Principles from Diagnosis: {{diagnose.learning_principles}}

      Produce:

      1. **Skill Updates**: Transferable skill patterns discovered. For each:
         - title: short name
         - content: step-by-step procedure with wiki-style entity links [[category/name]]
         - tags: relevant categories

      2. **Knowledge Updates**: New facts or corrected misconceptions. For each:
         - title: short name
         - content: what is now known, with wiki links
         - tags: relevant categories

      3. **Anti-Patterns**: Common mistakes to avoid. For each:
         - title: name of the anti-pattern
         - content: how to detect and avoid it
         - tags: relevant categories

      4. **Meta-Observation**: One sentence about capability gaps revealed by this cycle.

      Output format (JSON):
      {
        "skill_updates": [{"title": "...", "content": "...", "tags": [...]}],
        "knowledge_updates": [{"title": "...", "content": "...", "tags": [...]}],
        "anti_patterns": [{"title": "...", "content": "...", "tags": [...]}],
        "meta_observation": "...",
        "evolution_metrics": {
          "confidence_delta": N,
          "issues_resolved": N,
          "new_issues_introduced": N,
          "cycles_used": N
        }
      }
    tools: ["wiki_write"]
    next: "persist"

  persist:
    prompt: |
      Persist the distilled knowledge to the wiki system. Call wiki_write for each item.

      Distilled knowledge: {{distill}}

      For each skill_update, write to path "sops/{slugified_title}".
      For each knowledge_update, write to path "topics/{slugified_title}".
      For each anti_pattern, write to path "topics/anti-patterns/{slugified_title}".
      Add the tag "self_refined" to all pages.

      After persisting, summarize what was written.
    tools: ["wiki_write"]
    next: "DONE"
