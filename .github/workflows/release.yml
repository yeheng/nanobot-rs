name: Release

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Build
        run: cd gasket && cargo build --release --target ${{ matrix.target }} --all-features
      
      - name: Package (Linux/macOS)
        if: matrix.archive == 'tar.gz'
        run: |
          cd gasket/target/${{ matrix.target }}/release
          tar -czvf gasket-${{ matrix.target }}.tar.gz gasket
      
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: gasket/target/${{ matrix.target }}/release/gasket-${{ matrix.target }}.tar.gz

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Publish to crates.io
        run: |
          cd gasket
          cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} -p gasket-core || true
          sleep 10
          cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} -p gasket-cli || true
