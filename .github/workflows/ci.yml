name: CI

on:
  push:
    branches: [main]
    paths:
      - 'gasket/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'gasket/**'
      - '.github/workflows/ci.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            gasket/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('gasket/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Check formatting
        run: cd gasket && cargo fmt --all -- --check
      
      - name: Run clippy
        run: cd gasket && cargo clippy --all-features -- -D warnings
      
      - name: Run tests
        run: cd gasket && cargo test --all-features

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            gasket/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('gasket/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Build release
        run: cd gasket && cargo build --release --all-features
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gasket-linux
          path: gasket/target/release/gasket

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            gasket/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('gasket/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Build release
        run: cd gasket && cargo build --release --all-features
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gasket-macos
          path: gasket/target/release/gasket

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            gasket/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('gasket/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Build release
        run: cd gasket && cargo build --release --all-features
      
      - name: Package binary
        run: |
          cd gasket/target/release
          Compress-Archive -Update -Path gasket.exe -DestinationPath gasket-windows.zip 
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: gasket-windows
          path: gasket/target/release/gasket-windows.zip

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build docs
        run: cd gasket && cargo doc --no-deps --all-features
      
      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: gasket/target/doc
