name: "test_ping"
description: "Ping-pong JSON-RPC test"
protocol: json_rpc
parameters:
  type: object
  properties:
    name: { type: string, description: "Your name" }
  required: ["name"]
runtime:
  command: "python3"
  args: ["jsonrpc_ping/ping.py"]
  timeout_secs: 30
  env:
    PYTHONUNBUFFERED: "1"
permissions:
  - llm_chat
